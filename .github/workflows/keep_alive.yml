name: Keep Supabase Alive

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        # Added --fail to catch HTTP errors, and --retry logic to handle cold starts
        run: |
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
          
